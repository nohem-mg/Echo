# Priority 2: integration tests that drive the flow pipeline through the
# public flow-store API (verify → pay → upload → analyze → complete), plus a
# fast blockable typecheck. One bun install feeds everything.
# The flow-store suite runs twice: file adapter (local dev) and Postgres
# adapter (what every Vercel deployment uses) — the adapter creates its own
# schema, so the service container needs no init SQL.
# Deliberately NOT `next build` — Vercel already builds every PR preview — and
# no lint (skipped by choice to keep CI minutes low; fold in later if wanted).
name: Frontend tests

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-checks.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-checks.yml"

concurrency:
  group: frontend-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: echo
          POSTGRES_PASSWORD: echo
          POSTGRES_DB: echo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U echo -d echo"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Tests (file adapter)
        run: bun test
      - name: Flow-store tests (Postgres adapter)
        env:
          FLOW_STORE_TEST_DATABASE_URL: postgresql://echo:echo@localhost:5432/echo
        run: bun test src/lib/flow-store/flow-store.test.ts
      - run: bun run typecheck
