# Echo backend — service orchestrator.
#
# Quick start (Nohem / CRE):
#   1. docker compose up --build          # BasicPitch on :8001
#   2. bun backend/dev-gateway/server.ts  # CRE-facing API on :8080
#   3. cd cre && cre workflow simulate echo --target staging-settings \
#        --http-payload ./echo/sample-submission.json --trigger-index 0 --non-interactive
#
# CRE config already points to http://127.0.0.1:8080 (cre/echo/config.staging.json).
services:
  basic-pitch-service:
    build: ./services/basic-pitch-service
    platform: linux/amd64
    ports:
      - "8001:8001"
    env_file:
      - ./services/basic-pitch-service/.env.example
    restart: unless-stopped
