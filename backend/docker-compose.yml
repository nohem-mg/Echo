# Echo backend — service orchestrator. Quick start lives in README.md.
# Build context is this directory (backend/) so each image can pull in the shared
# echo-common package alongside its own service. One block per microservice; the
# CRE reaches the gateway, which fans out to the services by name on the internal
# network (e.g. http://basic-pitch-service:8001, http://acrcloud-service:8002).
#
# This base file is the DEV topology: every service publishes its port to the
# host and the gateway runs in dev mode. docker-compose.prod.yml overrides it for
# internet-facing deploys (TLS edge, internal-only ports) — see README.
services:
  gateway:
    build:
      context: .
      dockerfile: dev-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Reach the services by compose service name, not localhost.
      ECHO_BASIC_PITCH_URL: http://basic-pitch-service:8001
      ECHO_ACRCLOUD_URL: http://acrcloud-service:8002
      ECHO_MIDI_URL: http://midi-similarity-service:8003
      ECHO_REGISTRY_URL: http://registry-service:8004
      ECHO_REPORT_URL: http://report-service:8005
      ECHO_SOUNDCLOUD_URL: http://soundcloud-service:8006
      # Dev conveniences (fixture audio, Step-3 mock, report fallback). prod turns this off.
      ECHO_GATEWAY_DEV: "true"
    env_file:
      - path: ./.env
        required: false
    depends_on:
      - basic-pitch-service
      - acrcloud-service
      - midi-similarity-service
      - registry-service
      - report-service
      - soundcloud-service
    healthcheck:
      # 127.0.0.1, not localhost: busybox wget resolves localhost to ::1 first,
      # but Bun binds IPv4 (0.0.0.0), so localhost would be refused.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  basic-pitch-service:
    build:
      context: .
      dockerfile: services/basic-pitch-service/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - path: ./.env
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  acrcloud-service:
    build:
      context: .
      dockerfile: services/acrcloud-service/Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - path: ./.env
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  midi-similarity-service:
    build:
      context: .
      dockerfile: services/midi-similarity-service/Dockerfile
    ports:
      - "8003:8003"
    environment:
      # Pure compute: reads the registry over HTTP, owns no data.
      ECHO_MIDI_REGISTRY_URL: http://registry-service:8004
    env_file:
      - path: ./.env
        required: false
    depends_on:
      - registry-service
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  registry-service:
    build:
      context: .
      dockerfile: services/registry-service/Dockerfile
    ports:
      - "8004:8004"
    environment:
      # Owns the private registry; points at the compose Postgres service.
      ECHO_REGISTRY_DATABASE_URL: postgresql://echo:echo@registry-db:5432/echo
    env_file:
      - path: ./.env
        required: false
    depends_on:
      registry-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  report-service:
    build:
      context: .
      dockerfile: services/report-service/Dockerfile
    ports:
      - "8005:8005"
    env_file:
      - path: ./.env
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  soundcloud-service:
    build:
      context: .
      dockerfile: services/soundcloud-service/Dockerfile
    ports:
      - "8006:8006"
    env_file:
      - path: ./.env
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  registry-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: echo
      POSTGRES_PASSWORD: echo
      POSTGRES_DB: echo
    # Published to the host for local psql / host-side integration tests.
    # Services reach it internally as registry-db:5432 regardless.
    ports:
      - "5432:5432"
    volumes:
      - registry-data:/var/lib/postgresql/data
      # Schema is owned by the DB: every *.sql here runs once on first init.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U echo -d echo" ]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  registry-data:
