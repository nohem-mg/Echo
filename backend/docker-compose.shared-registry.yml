# Registre privé 2B partagé entre devs (Neon / Vercel Postgres / etc.).
#
#   cp .env.example .env   # puis ECHO_REGISTRY_DATABASE_URL=postgresql://...
#   docker compose -f docker-compose.yml -f docker-compose.shared-registry.yml up --build
#
# Sans local registry-db : registry-service lit ECHO_REGISTRY_DATABASE_URL depuis backend/.env
services:
  registry-db:
    profiles: ["local-registry"]

  registry-service:
    depends_on: !reset []
    environment:
      ECHO_REGISTRY_DATABASE_URL: ${ECHO_REGISTRY_DATABASE_URL:?Set ECHO_REGISTRY_DATABASE_URL in backend/.env (shared team registry)}
